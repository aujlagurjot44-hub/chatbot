<!DOCTYPE html>
<html>
<head>
  <title>Gurjot AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      display: flex;
      background: #fff;
      color: #000;
    }

    .sidebar {
      width: 200px;
      border-right: 1px solid #ccc;
      padding: 10px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #ccc;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
    }

    .message {
      display: flex;
      margin: 10px 0;
    }

    .user { justify-content: flex-end; }
    .bot { justify-content: flex-start; }

    .bubble {
      padding: 10px;
      border-radius: 10px;
      max-width: 60%;
      border: 1px solid #000;
      white-space: pre-line;
    }

    .user .bubble {
      background: black;
      color: white;
    }

    footer {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ccc;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #000;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border: 1px solid #000;
      background: white;
      cursor: pointer;
    }

    .copy-btn {
      font-size: 12px;
      margin-left: 5px;
      cursor: pointer;
    }

    .typing {
      font-style: italic;
      color: gray;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <b>History</b><br><br>
  <button onclick="newChat()">+ New Chat</button>
  <button onclick="clearChat()">Clear</button>
</div>

<div class="main">

<header>Gurjot AI</header>

<div id="chat"></div>

<footer>
  <input type="text" id="userInput" placeholder="Type..." />
  <button onclick="sendMessage()">Send</button>
  <button onclick="startVoice()">🎤</button>
</footer>

</div>

<script>
let chat = document.getElementById("chat");

let messages = [
  { role: "system", content: "You are a smart AI. Reply in Hinglish." }
];

// 🔴 API YAHAN DALNI HAI
const API_KEY = "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";

// AI
async function getBotReply(input) {
  messages.push({ role: "user", content: input });

  let res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "openai/gpt-3.5-turbo",
      messages: messages
    })
  });

  let data = await res.json();
  let reply = data.choices[0].message.content;

  messages.push({ role: "assistant", content: reply });

  return reply;
}

// Send
async function sendMessage() {
  let input = document.getElementById("userInput").value;
  if(!input) return;

  addMessage(input, "user");
  document.getElementById("userInput").value = "";

  let typingId = "typing" + Date.now();
  chat.innerHTML += `<div id="${typingId}" class="message bot typing">Typing...</div>`;

  let reply = await getBotReply(input);

  document.getElementById(typingId).remove();

  addMessage(reply, "bot");

  chat.scrollTop = chat.scrollHeight;
}

// Add message
function addMessage(text, type) {
  chat.innerHTML += `
    <div class="message ${type}">
      <div class="bubble">
        ${text}
        ${type === "bot" ? `<span class="copy-btn" onclick="copyText(this)">📋</span>` : ""}
      </div>
    </div>
  `;
}

// Copy
function copyText(el) {
  navigator.clipboard.writeText(el.parentElement.innerText);
  alert("Copied!");
}

// Voice
function startVoice() {
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "en-US";

  recognition.onresult = function(e) {
    document.getElementById("userInput").value = e.results[0][0].transcript;
  };

  recognition.start();
}

// Enter
document.getElementById("userInput").addEventListener("keypress", function(e) {
  if(e.key === "Enter") sendMessage();
});

// Clear
function clearChat() {
  chat.innerHTML = "";
}

// New Chat
function newChat() {
  messages = [
    { role: "system", content: "You are a smart AI. Reply in Hinglish." }
  ];
  clearChat();
}
</script>

</body>
</html>
