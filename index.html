<!DOCTYPE html>
<html>
<head>
<title>Gurjot AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;display:flex;height:100vh}
.sidebar{width:250px;background:#f4f4f4;padding:10px}
.main{flex:1;display:flex;flex-direction:column}
#chat{flex:1;overflow:auto;padding:10px}
.msg{margin:10px}
.user{text-align:right}
.bot{text-align:left}
textarea{width:100%;height:50px}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="newChat()">+ New</button>
<div id="list"></div>
</div>

<div class="main">
<h2>Gurjot AI</h2>
<div id="chat"></div>

<textarea id="input"></textarea>
<button onclick="send()">Send</button>
</div>

<script>

const API_KEY="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";

let chats=[];
let current=0;

function system(){
 return "Reply directly. Match user language.";
}

function newChat(){
 let id=Date.now();
 chats.push({id,title:"Chat",messages:[{role:"system",content:system()}]});
 current=id;
 render();load();
}

function render(){
 let list=document.getElementById("list");
 list.innerHTML="";
 chats.forEach(c=>{
  list.innerHTML+=`<div onclick="openChat(${c.id})">${c.title}</div>`;
 });
}

function openChat(id){
 current=id;load();
}

function load(){
 let box=document.getElementById("chat");
 box.innerHTML="";
 let c=chats.find(x=>x.id===current);
 c.messages.forEach(m=>{
  if(m.role!="system"){
   box.innerHTML+=`<div class="msg ${m.role}">${m.content}</div>`;
  }
 });
}

async function getReply(input){
 let c=chats.find(x=>x.id===current);
 c.messages.push({role:"user",content:input});

 try{
  let res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
   method:"POST",
   headers:{
    "Authorization":"Bearer "+API_KEY,
    "Content-Type":"application/json",
    "HTTP-Referer":location.origin + location.pathname,
    "X-Title":"Gurjot AI"
   },
   body:JSON.stringify({
    model:"openai/gpt-4o-mini",
    messages:c.messages
   })
  });

  let data=await res.json();

  if(!res.ok){
    return "❌ "+(data.error?.message || "API Error");
  }

  let reply=data.choices?.[0]?.message?.content || "No response";

  c.messages.push({role:"assistant",content:reply});

  return reply;

 }catch(e){
  return "❌ Network Error";
 }
}

async function send(){
 let inp=document.getElementById("input").value;
 if(!inp)return;

 let box=document.getElementById("chat");
 box.innerHTML+=`<div class="msg user">${inp}</div>`;

 let reply=await getReply(inp);

 box.innerHTML+=`<div class="msg bot">${reply}</div>`;

 document.getElementById("input").value="";
}

newChat();

</script>

</body>
</html>
