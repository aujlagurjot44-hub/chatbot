<!DOCTYPE html>
<html>
<head>
<title>Gurjot AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body{margin:0;font-family:system-ui;display:flex;height:100vh;overflow:hidden}
.dark{background:#111;color:#fff}

.sidebar{width:260px;background:#f5f5f5;padding:10px;border-right:1px solid #ddd}
.dark .sidebar{background:#1a1a1a}

.chat-item{
display:flex;justify-content:space-between;
padding:8px;margin:5px 0;background:#fff;border-radius:6px
}
.dark .chat-item{background:#333}

.main{flex:1;display:flex;flex-direction:column}

header{text-align:center;padding:10px;font-weight:bold;border-bottom:1px solid #ddd}

/* CHAT */
#chat{flex:1;overflow-y:auto;padding:15px;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:6px}
#chat::-webkit-scrollbar-thumb{background:#999;border-radius:10px}

.msg{margin:10px 0;display:flex;position:relative}
.user{justify-content:flex-end}
.bot{justify-content:flex-start}

.bubble{padding:10px;border-radius:10px;max-width:70%}
.user .bubble{background:#000;color:#fff}
.dark .user .bubble{background:#fff;color:#000}
.bot .bubble{background:#eee}
.dark .bot .bubble{background:#444}

/* ACTIONS */
.actions{position:absolute;top:-15px;right:10px;opacity:0;display:flex;gap:5px}
.msg:hover .actions{opacity:1}

.action-btn{border:none;padding:3px 6px;background:#fff;cursor:pointer;border-radius:4px}
.dark .action-btn{background:#333;color:#fff}

/* INPUT */
footer{display:flex;padding:10px;border-top:1px solid #ddd}
textarea{flex:1;height:45px;padding:10px;border-radius:6px}
button{margin-left:5px;padding:10px;border:none;background:black;color:white;border-radius:6px}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="newChat()">+ New</button>
<button onclick="toggleDark()">🌙</button>
<div id="list"></div>
</div>

<div class="main">
<header>Gurjot AI</header>
<div id="chat"></div>

<footer>
<textarea id="input"></textarea>
<button onclick="send()">Send</button>
<button onclick="voice()">🎤</button>
</footer>
</div>

<script>

const API_KEY="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";

let chats=[];
let current=0;

function system(){
 return "You are Gurjot AI. Reply directly, no extra intro. Match user language.";
}

/* CHAT CONTROL */
function newChat(){
 let id=Date.now();
 chats.push({id,title:"New Chat",messages:[{role:"system",content:system()}]});
 current=id;
 save();render();load();
}
function save(){localStorage.setItem("chats",JSON.stringify(chats));}
function load(){
 let box=document.getElementById("chat");box.innerHTML="";
 let c=chats.find(x=>x.id===current); if(!c)return;
 c.messages.forEach((m,i)=>{ if(m.role!="system"){addMsg(m.content,m.role,i);} });
}
function render(){
 let list=document.getElementById("list");list.innerHTML="";
 chats.forEach(c=>{
  list.innerHTML+=`
  <div class="chat-item">
    <span onclick="openChat(${c.id})">${c.title}</span>
    <span onclick="rename(${c.id})">✏️</span>
    <span onclick="del(${c.id})">🗑</span>
  </div>`;
 });
}
function openChat(id){current=id;load();}
function del(id){chats=chats.filter(x=>x.id!==id);save();render();}
function rename(id){
 let name=prompt("Rename:");
 let c=chats.find(x=>x.id===id);
 if(name)c.title=name;
 save();render();
}

/* MESSAGE UI */
function addMsg(text,type,i){
 let d=document.createElement("div");
 d.className="msg "+type;

 let b=document.createElement("div");
 b.className="bubble";
 b.innerHTML=marked.parse(text);

 let actions=`
 <div class="actions">
  <button class="action-btn" onclick="copy(${i})">📋</button>
  ${type=="user"?`<button class="action-btn" onclick="edit(${i})">✏️</button>`:""}
 </div>`;
 b.innerHTML+=actions;

 d.appendChild(b);
 document.getElementById("chat").appendChild(d);
 hljs.highlightAll();
}

/* COPY / EDIT */
function copy(i){
 let c=chats.find(x=>x.id===current);
 navigator.clipboard.writeText(c.messages[i].content);
}
function edit(i){
 let c=chats.find(x=>x.id===current);
 let t=prompt("Edit:",c.messages[i].content);
 if(!t)return;
 c.messages[i].content=t;
 c.messages=c.messages.slice(0,i+1);
 save();load();
}

/* AI CALL */
async function getReply(input){
 let c=chats.find(x=>x.id===current);
 c.messages.push({role:"user",content:input});

 try{
  let res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
   method:"POST",
   headers:{
    "Authorization":"Bearer "+API_KEY,
    "Content-Type":"application/json",
    "HTTP-Referer":"https://aujlagurjot44-hub.github.io",
    "X-Title":"Gurjot AI"
   },
   body:JSON.stringify({
    model:"openai/gpt-4o-mini",
    messages:c.messages
   })
  });

  let data=await res.json();

  if(!res.ok){
    return "❌ "+(data.error?.message||"API Error");
  }

  let reply=data.choices[0].message.content;

  c.messages.push({role:"assistant",content:reply});
  save();render();

  return reply;

 }catch(e){
  return "❌ Network Error";
 }
}

/* SEND */
async function send(){
 let inp=document.getElementById("input").value.trim();
 if(!inp)return;

 addMsg(inp,"user");
 document.getElementById("input").value="";

 let bot=document.createElement("div");
 bot.className="msg bot";
 let b=document.createElement("div");
 b.className="bubble";
 bot.appendChild(b);
 document.getElementById("chat").appendChild(bot);

 let reply=await getReply(inp);
 b.innerHTML=marked.parse(reply);

 document.getElementById("chat").scrollTop=999999;
}

/* ENTER */
document.getElementById("input").addEventListener("keydown",e=>{
 if(e.key==="Enter"&&!e.shiftKey){
  e.preventDefault();
  send();
 }
});

/* VOICE */
function voice(){
 let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
 rec.start();
 rec.onresult=e=>{
  document.getElementById("input").value=e.results[0][0].transcript;
 };
}

/* DARK MODE */
function toggleDark(){
 document.body.classList.toggle("dark");
}

/* INIT */
newChat();

</script>

</body>
</html>
